version: "2"
sql:
  - schema: "schema.sql"
    queries: "query.sql"
    engine: "postgresql"
    gen:
      go:
        package: "db"
        out: "src/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        # This tells sqlc to use the pgx/v5 driver features
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.uuid"